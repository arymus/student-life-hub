<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Arymus Reyes" />
    <title>Student Life Hub</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="" href="assets/" />
</head>
<body>
    <header>
        <h1>Student Life Hub</h1>
        <nav>
            <a href="#profile">Profile</a>
            <a href="#classes">Classes</a>
            <a href="#to-do"> To-Do</a>
        </nav>
    </header>
    <main>
        <section id="profile">
            <h2>Student Profile</h2>
            <div id="basic-info">
                <h3>Basic Information</h3>
                <form>
                    <input type="text" placeholder="First name" name="fname" />
                    <input type="text" placeholder="Last name" name="lname" />
                    <input type="number" placeholder="Grade" name="grade" />
                    <input type="submit" />
                </form>
            </div>

            <div id="more-info">
                <h3>More About Me</h3>
                <form>
                    <textarea type="text" placeholder="My bio" name="bio"></textarea>
                    <input type="submit" />
                </form>
            </div>
            
            <div id="about-me">
              <p id="my-name"></p>
              <p id="my-grade"></p>
              <p id="my-bio"></p>
            </div>
        </section>

        <section id="classes">
            <h2>My Classes</h2>
            <div id="schedule">
                <h3>Add a Class</h3>
                <form>
                    <input type="text" placeholder="Class name" name="className" />
                    <input type="number" placeholder="Period" name="period" />
                    <input type="number" placeholder="Room number" name="roomNumber" />
                    <input type="text" placeholder="Teacher" name="teacher" />
                    <input type="submit" value="Add class" />
                </form>
            </div>

            <h3>Schedule</h3>
            <ol id="my-classes"></ol>
        </section>

        <section id="to-do">
            <h2>Weekly To-Do</h2>
            <div id="tasks">
                <h3>Submit a task</h3>
                <form>
                    <input type="text" placeholder="Task" name="taskName" />
                    <input type="submit" value="Add task" />
                </form>
            </div>
            <ul id="my-tasks"></ul>
        </section>
    </main>
    <footer>
      <p>&copy; Arymus Reyes 2026. All Rights Reserved.</p>
      <nav>
        <a href="https://github.com/arymus">GitHub</a>
        <a href="https://github.com/arymus/student-life-hub">Source Code</a>
        <a href="mailto:arymusr@gmail.com">Email</a>
      </nav>
    </footer>
    <script src="script.js" defer></script>
</body>
</html>
